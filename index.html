<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>DEADZONE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:system-ui,sans-serif}
#game{width:100%;height:100%;position:fixed;top:0;left:0}
#start{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a0a0a,#0d0d0d);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center}
#start h1{font-size:clamp(32px,10vw,64px);color:#e74c3c;text-shadow:0 0 20px #c0392b;margin-bottom:8px;letter-spacing:4px}
#start p{color:#666;margin-bottom:40px;font-size:14px}
#start button{padding:16px 48px;font-size:18px;background:#c0392b;border:none;color:#fff;border-radius:4px;cursor:pointer;box-shadow:0 0 20px rgba(192,57,43,0.4)}
#hud{position:fixed;top:0;left:0;width:100%;padding:15px;z-index:50;display:none;pointer-events:none}
.health{width:120px;height:6px;background:rgba(255,255,255,0.2);border-radius:3px;overflow:hidden}
.health-fill{height:100%;background:#e74c3c;width:100%;transition:width 0.2s}
.weapon{position:fixed;bottom:20px;right:20px;font-size:24px;color:#fff;z-index:50}
.ammo{position:fixed;bottom:20px;right:70px;font-size:16px;color:#888;z-index:50}
.wave{position:fixed;top:20px;right:20px;font-size:14px;color:#888;z-index:50}
.crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;z-index:50;pointer-events:none}
.crosshair::before,.crosshair::after{content:'';position:absolute;background:rgba(255,255,255,0.7)}
.crosshair::before{width:2px;height:100%;left:50%;transform:translateX(-50%)}
.crosshair::after{height:2px;width:100%;top:50%;transform:translateY(-50%)}
.damage{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(transparent,rgba(139,0,0,0.5));z-index:45;opacity:0;pointer-events:none;transition:opacity 0.1s}
.vignette{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(transparent,rgba(80,0,0,0.6));z-index:44;opacity:0;pointer-events:none}
#joystick{position:fixed;bottom:20px;left:20px;width:120px;height:120px;z-index:60}
#joystick-base{width:100%;height:100%;border-radius:50%;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2)}
#joystick-stick{width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,0.3);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
#fire-btn{position:fixed;bottom:30px;right:30px;width:90px;height:90px;border-radius:50%;background:rgba(192,57,43,0.4);border:3px solid rgba(192,57,43,0.7);color:#fff;font-size:16px;font-weight:bold;z-index:60;display:flex;align-items:center;justify-content:center}
#look-zone{position:fixed;top:0;right:0;width:50%;height:100%;z-index:55}
#weapon-btns{position:fixed;top:50%;right:10px;transform:translateY(-50%);z-index:60;display:flex;flex-direction:column;gap:10px}
.wep-btn{width:50px;height:40px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:#888;font-size:12px}
.wep-btn.active{background:rgba(192,57,43,0.4);border-color:#c0392b;color:#e74c3c}
#action-btns{position:fixed;bottom:140px;right:30px;z-index:60;display:flex;flex-direction:column;gap:10px}
.action-btn{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);color:#fff;font-size:14px}
#enemy-count{position:fixed;top:20px;left:20px;font-size:12px;color:#e74c3c;z-index:50}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="start">
<h1>DEADZONE</h1>
<p>SURVIVE THE HORDE</p>
<button id="playBtn" onclick="startGame()">PLAY</button>
</div>
<div id="hud">
<div class="health"><div class="health-fill" id="hp-fill"></div></div>
</div>
<div class="weapon" id="weapon">PISTOL</div>
<div class="ammo" id="ammo">15/90</div>
<div class="wave" id="wave">WAVE 1</div>
<div class="crosshair"></div>
<div class="damage" id="damage-flash"></div>
<div class="vignette" id="vignette"></div>
<div id="enemy-count">ENEMIES: 0</div>
<div id="joystick"><div id="joystick-base"><div id="joystick-stick"></div></div></div>
<div id="fire-btn">FIRE</div>
<div id="look-zone"></div>
<div id="weapon-btns">
<div class="wep-btn active" id="wep1">1</div>
<div class="wep-btn" id="wep2">2</div>
<div class="wep-btn" id="wep3">3</div>
</div>
<div id="action-btns">
<div class="action-btn" id="btn-reload">R</div>
<div class="action-btn" id="btn-jump">⬆</div>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();window.addEventListener('resize',resize);
let game={running:false,health:100,wave:1,kills:0,weapon:0,ammo:[15,90],reloading:false};
const weapons=[{name:'PISTOL',damage:25,rate:200,ammo:15,max:90,spread:0.02},{name:'SHOTGUN',damage:12,rate:700,ammo:8,max:48,spread:0.08, pellets:6},{name:'RIFLE',damage:18,rate:100,ammo:30,max:120,spread:0.03}];
let player={x:0,y:0,z:5,rot:0, pitch:0, vy:0, onGround:true};
let bullets=[];
let enemies=[];
let particles=[];
const buildings=[];
for(let i=0;i<15;i++){buildings.push({x:(Math.random()-0.5)*80,z:(Math.random()-0.5)*80,w:4+Math.random()*8,h:6+Math.random()*12,d:4+Math.random()*8});}
let keys={},mouseDown=false;
let joyVec={x:0,y:0},lookVel={x:0,y:0};
function setupTouch(){
const joy=document.getElementById('joystick');
const stick=document.getElementById('joystick-stick');
let joyId=null,joyStartX,joyStartY;
joy.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];joyId=t.identifier;joyStartX=t.clientX;joyStartY=t.clientY;},{passive:false});
joy.addEventListener('touchmove',e=>{e.preventDefault();for(let t of e.changedTouches){if(t.identifier===joyId){let dx=t.clientX-joyStartX,dy=t.clientY-joyStartY;let dist=Math.min(40,Math.sqrt(dx*dx+dy*dy));let ang=Math.atan2(dy,dx);joyVec.x=Math.cos(ang)*dist/40;joyVec.y=Math.sin(ang)*dist/40;stick.style.transform=`translate(calc(-50% + ${joyVec.x*40}px), calc(-50% + ${joyVec.y*40}px))`;}}},{passive:false});
joy.addEventListener('touchend',e=>{for(let t of e.changedTouches){if(t.identifier===joyId){joyVec={x:0,y:0};stick.style.transform='translate(-50%,-50%)';joyId=null;}}});
const look=document.getElementById('look-zone');
let lookId=null,lastX,lastY;
look.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];lookId=t.identifier;lastX=t.clientX;lastY=t.clientY;},{passive:false});
look.addEventListener('touchmove',e=>{e.preventDefault();for(let t of e.changedTouches){if(t.identifier===lookId){let dx=t.clientX-lastX,dy=t.clientY-lastY;player.rot-=dx*0.005;player.pitch-=dy*0.005;player.pitch=Math.max(-0.8,Math.min(0.8,player.pitch));lastX=t.clientX;lastY=t.clientY;}}},{passive:false});
look.addEventListener('touchend',e=>{for(let t of e.changedTouches){if(t.identifier===lookId)lookId=null;}});
document.getElementById('fire-btn').addEventListener('touchstart',e=>{e.preventDefault();mouseDown=true},{passive:false});
document.getElementById('fire-btn').addEventListener('touchend',e=>{mouseDown=false});
document.getElementById('btn-reload').addEventListener('touchstart',e=>{e.preventDefault();reload()},{passive:false});
document.getElementById('btn-jump').addEventListener('touchstart',e=>{e.preventDefault();if(player.onGround){player.vy=0.3;player.onGround=false}},{passive:false});
document.getElementById('wep1').addEventListener('touchstart',e=>{e.preventDefault();switchWeapon(0)},{passive:false});
document.getElementById('wep2').addEventListener('touchstart',e=>{e.preventDefault();switchWeapon(1)},{passive:false});
document.getElementById('wep3').addEventListener('touchstart',e=>{e.preventDefault();switchWeapon(2)},{passive:false});
}
setupTouch();
function switchWeapon(i){if(game.reloading)return;game.weapon=i;document.querySelectorAll('.wep-btn').forEach((el,idx)=>el.classList.toggle('active',idx===i));document.getElementById('weapon').textContent=weapons[i].name;}
function reload(){if(game.reloading||game.ammo[game.weapon]===weapons[game.weapon].ammo)return;game.reloading=true;setTimeout(()=>{let w=weapons[game.weapon],need=w.ammo-game.ammo[game.weapon];let take=Math.min(need,w.max);game.ammo[game.weapon]+=take;game.reloading=false;},1500);}
function fire(){let w=weapons[game.weapon];let now=performance.now();if(game.reloading||game.ammo[game.weapon]<=0||(game.lastShot&&now-game.lastShot<w.rate))return;game.ammo[game.weapon]--;game.lastShot=now;let pellets=w.pellets||1;for(let i=0;i<pellets;i++){let spread=w.spread;let angle=player.rot+(Math.random()-0.5)*spread;bullets.push({x:player.x,y:player.y,z:player.z,vx:Math.sin(angle)*0.4,vy:-0.05,vz:-Math.cos(angle)*0.4,life:60});}player.pitch+=0.02;}
function spawnEnemy(){let angle=Math.random()*Math.PI*2;let dist=15+Math.random()*10;enemies.push({x:player.x+Math.sin(angle)*dist,z:player.z+Math.cos(angle)*dist,hp:30+game.wave*10,speed:0.03+game.wave*0.003});}
function project(x,y,z){let cx=W/2,cy=H/2;let dz=z-player.z;if(dz<0.1)dz=0.1;let scale=400/dz;let px=player.rot;let rx=x-player.x,rz=z-player.z;let rx2=rx*Math.cos(-px)-rz*Math.sin(-px);let rz2=rx*Math.sin(-px)+rz*Math.cos(-px);return {x:cx+rx2*scale,y:cy+(y-player.y+player.pitch*dz*0.5)*scale,s:scale};}
function drawBuilding(b){let p1=project(b.x-b.w/2,b.h,b.z-b.d/2);let p2=project(b.x+b.w/2,b.h,b.z-b.d/2);let p3=project(b.x+b.w/2,b.h,b.z+b.d/2);let p4=project(b.x-b.w/2,b.h,b.z+b.d/2);let p1b=project(b.x-b.w/2,0,b.z-b.d/2);let p2b=project(b.x+b.w/2,0,b.z-b.d/2);let p3b=project(b.x+b.w/2,0,b.z+b.d/2);let p4b=project(b.x-b.w/2,0,b.z+b.d/2);ctx.fillStyle='#222';ctx.beginPath();ctx.moveTo(p1b.x,p1b.y);ctx.lineTo(p2b.x,p2b.y);ctx.lineTo(p3b.x,p3b.y);ctx.lineTo(p4b.x,p4b.y);ctx.fill();ctx.fillStyle='#333';ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.lineTo(p2b.x,p2b.y);ctx.lineTo(p1b.x,p1b.y);ctx.fill();ctx.beginPath();ctx.moveTo(p2.x,p2.y);ctx.lineTo(p3.x,p3.y);ctx.lineTo(p3b.x,p3b.y);ctx.lineTo(p2b.x,p2b.y);ctx.fill();ctx.fillStyle=Math.random()>0.7?'#663300':'#112233';for(let wy=2;wy<b.h-1;wy+=2.5){let pw=project(b.x-b.w/2+0.5,wy,b.z);if(pw.s>50)ctx.fillRect(pw.x,pw.y,4*pw.s/100,4*pw.s/100);}}
function render(){ctx.fillStyle='#0a0a12';ctx.fillRect(0,0,W,H);let groundP1=project(-50,0,-50),groundP2=project(50,0,50);ctx.fillStyle='#1a1a1a';ctx.fillRect(groundP1.x,groundP1.y,groundP2.x-groundP1.x,groundP2.y-groundP1.y);buildings.sort((a,b)=>{let da=(a.x-player.x)**2+(a.z-player.z)**2;let db=(b.x-player.x)**2+(b.z-player.z)**2;return db-da;});buildings.forEach(drawBuilding);enemies.forEach(e=>{let p=project(e.x,1.5,e.z);let size=100/p.s;ctx.fillStyle='#4a5544';ctx.beginPath();ctx.arc(p.x,p.y,size,0,Math.PI*2);ctx.fill();ctx.fillStyle='#f00';ctx.beginPath();ctx.arc(p.x-size*0.3,p.y-size*0.2,size*0.15,0,Math.PI*2);ctx.arc(p.x+size*0.3,p.y-size*0.2,size*0.15,0,Math.PI*2);ctx.fill();});bullets.forEach(b=>{let p=project(b.x,b.y,b.z);ctx.fillStyle='#ff0';ctx.fillRect(p.x-2,p.y-2,4,4);});particles.forEach(p=>{let pr=project(p.x,p.y,p.z);ctx.globalAlpha=p.life/30;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(pr.x,pr.y,50/pr.s,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;}
function update(){if(!game.running)return;let speed=joyVec.y>0.1?0.15:0.08;let ang=player.rot;player.x+=Math.sin(ang)*joyVec.y*speed;player.z+=Math.cos(ang)*joyVec.y*speed;player.x+=Math.cos(ang)*joyVec.x*speed*0.7;player.z-=Math.sin(ang)*joyVec.x*speed*0.7;player.vy-=0.008;player.y+=player.vy;if(player.y<0){player.y=0;player.vy=0;player.onGround=true;}player.pitch*=0.9;if(mouseDown)fire();bullets.forEach((b,i)=>{b.x+=b.vx;b.y+=b.vy;b.z+=b.vz;b.vy-=0.002;b.life--;enemies.forEach((e,ei)=>{let dx=b.x-e.x,dy=b.y-1.5,dz=b.z-e.z;if(dx*dx+dy*dy+dz*dz<1){e.hp-=weapons[game.weapon].damage;b.life=0;for(let k=0;k<5;k++){particles.push({x:e.x,y:1.5,z:e.z,vx:(Math.random()-0.5)*0.2,vy:Math.random()*0.2,vz:(Math.random()-0.5)*0.2,life:20,color:'#800'});}if(e.hp<=0){enemies.splice(ei,1);game.kills++;document.getElementById('damage-flash').style.opacity='0.3';setTimeout(()=>document.getElementById('damage-flash').style.opacity='0',100);}}});});bullets=bullets.filter(b=>b.life>0);enemies.forEach(e=>{let dx=player.x-e.x,dz=player.z-e.z;let dist=Math.sqrt(dx*dx+dz*dz);if(dist>0.5){e.x+=dx/dist*e.speed;e.z+=dz/dist*e.speed;}else{game.health-=0.5;document.getElementById('damage-flash').style.opacity='0.5';setTimeout(()=>document.getElementById('damage-flash').style.opacity='0',100);}});if(enemies.length<5+game.wave*2&&Math.random()<0.02)spawnEnemy();if(enemies.length===0&&game.wave<20){game.wave++;game.health=Math.min(100,game.health+20);}particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.z+=p.vz;p.vy-=0.01;p.life--;});particles=particles.filter(p=>p.life>0);document.getElementById('hp-fill').style.width=game.health+'%';document.getElementById('ammo').textContent=game.ammo[game.weapon]+'/'+weapons[game.weapon].max;document.getElementById('wave').textContent='WAVE '+game.wave;document.getElementById('enemy-count').textContent='ENEMIES: '+enemies.length;document.getElementById('vignette').style.opacity=game.health<30?0.6:0;if(game.health<=0){game.running=false;document.getElementById('start').style.display='flex';document.querySelector('#start h1').textContent='GAME OVER';document.querySelector('#start button').textContent='PLAY AGAIN';}}
function loop(){update();render();requestAnimationFrame(loop);}
function startGame(){game={running:true,health:100,wave:1,kills:0,weapon:0,ammo:[15,90],reloading:false};player={x:0,y:0,z:5,rot:0,pitch:0,vy:0,onGround:true};bullets=[];enemies=[];particles=[];document.getElementById('start').style.display='none';document.getElementById('hud').style.display='block';for(let i=0;i<5;i++)spawnEnemy();}
loop();
document.getElementById('playBtn').addEventListener('click',startGame);
document.getElementById('playBtn').addEventListener('touchstart',e=>{e.preventDefault();startGame()},{passive:false});
</script>
</body>
</html>
