<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DEADZONE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
#game{width:100%;height:100%;display:block}
#start{position:fixed;top:0;left:0;width:100%;height:100%;background:#1a0a0a;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center}
#start h1{font-size:42px;color:#e74c3c;margin-bottom:8px}
#start p{color:#666;margin-bottom:25px;font-size:13px}
#start button{padding:12px 36px;font-size:15px;background:#c0392b;border:none;color:#fff;border-radius:4px}
#hud{position:fixed;top:10px;left:10px;z-index:50;display:none;pointer-events:none}
.health{width:90px;height:7px;background:#333;border-radius:3px}
.health-fill{height:100%;background:#e74c3c;width:100%}
.weapon{position:fixed;bottom:18px;right:18px;font-size:18px;z-index:50;color:#fff}
.ammo{position:fixed;bottom:18px;right:70px;font-size:13px;color:#888;z-index:50}
.wave{position:fixed;top:10px;right:10px;font-size:13px;color:#888;z-index:50}
.enemy-count{position:fixed;top:32px;right:10px;font-size:11px;color:#e74c3c;z-index:50}
#joystick{position:fixed;bottom:18px;left:18px;width:100px;height:100px;z-index:60}
#joystick-base{width:100%;height:100%;border-radius:50%;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.25)}
#joystick-stick{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.3);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
#fire-btn{position:fixed;bottom:25px;right:25px;width:75px;height:75px;border-radius:50%;background:rgba(192,57,43,0.6);border:3px solid #c0392b;color:#fff;font-size:13px;font-weight:bold;z-index:60;display:flex;align-items:center;justify-content:center}
#look-zone{position:fixed;top:0;right:0;width:50%;height:100%;z-index:55}
#weapon-btns{position:fixed;top:35%;right:8px;z-index:60}
.wep-btn{width:40px;height:30px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);border-radius:5px;color:#999;font-size:11px;margin-bottom:6px}
.wep-btn.active{background:rgba(192,57,43,0.6);border-color:#c0392b;color:#e74c3c}
#action-btns{position:fixed;bottom:115px;right:25px;z-index:60}
.action-btn{width:45px;height:45px;border-radius:50%;background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.25);color:#fff;font-size:11px;margin-bottom:6px}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="start">
<h1>DEADZONE</h1>
<p>TAP TO SURVIVE</p>
<button onclick="startGame()">PLAY</button>
</div>
<div id="hud"><div class="health"><div class="health-fill" id="hp-fill"></div></div></div>
<div class="weapon" id="weapon">PISTOL</div>
<div class="ammo" id="ammo">15</div>
<div class="wave" id="wave">WAVE 1</div>
<div class="enemy-count" id="enemy-count">0</div>
<div id="joystick"><div id="joystick-base"><div id="joystick-stick"></div></div></div>
<div id="fire-btn">FIRE</div>
<div id="look-zone"></div>
<div id="weapon-btns">
<div class="wep-btn active" id="wep1">1</div>
<div class="wep-btn" id="wep2">2</div>
<div class="wep-btn" id="wep3">3</div>
</div>
<div id="action-btns">
<div class="action-btn" id="btn-reload">R</div>
<div class="action-btn" id="btn-jump">JUMP</div>
</div>
<script>
// Canvas
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);}
resize();window.addEventListener('resize',resize);

// Audio
const Audio={
  ctx:null,
  init(){this.ctx=new(window.AudioContext||window.webkitAudioContext)();},
  shoot(){
    if(!this.ctx)return;
    const osc=this.ctx.createOscillator();
    const gain=this.ctx.createGain();
    osc.type='square';
    osc.frequency.setValueAtTime(180,this.ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(40,this.ctx.currentTime+0.08);
    gain.gain.setValueAtTime(0.12,this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01,this.ctx.currentTime+0.08);
    osc.connect(gain);gain.connect(this.ctx.destination);
    osc.start();osc.stop(this.ctx.currentTime+0.08);
  },
  hit(){
    if(!this.ctx)return;
    const osc=this.ctx.createOscillator();
    const gain=this.ctx.createGain();
    osc.type='sawtooth';
    osc.frequency.value=70;
    gain.gain.setValueAtTime(0.08,this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01,this.ctx.currentTime+0.1);
    osc.connect(gain);gain.connect(this.ctx.destination);
    osc.start();osc.stop(this.ctx.currentTime+0.1);
  }
};

// Game
let game={running:false,health:100,wave:1,weapon:0,ammo:[15,90],reloading:false};
const weapons=[{name:'PISTOL',damage:25,rate:250,ammo:15,max:90,spread:0.03},{name:'SHOTGUN',damage:10,rate:800,ammo:8,max:48,spread:0.12, pellets:5},{name:'RIFLE',damage:18,rate:120,ammo:30,max:120,spread:0.025}];
let player={x:0,y:0,z:0,rot:0,pitch:0,vy:0,ground:true};
let bullets=[];
let enemies=[];
let particles=[];

// Map - 12 buildings scattered around
const buildings=[];
for(let i=0;i<12;i++){
  let bx=(Math.random()-0.5)*50;
  let bz=(Math.random()-0.5)*50;
  // Keep away from center
  if(Math.abs(bx)<5&&Math.abs(bz)<5){bx+=10;bz+=10;}
  buildings.push({x:bx,z:bz,w:4+Math.random()*5,h:5+Math.random()*8,d:4+Math.random()*5});
}
const BOUNDS=40;

// Input
let mouseDown=false;
let joyVec={x:0,y:0};

// Touch
const joy=document.getElementById('joystick');
const stick=document.getElementById('joystick-stick');
let joyId=null,joyStartX,joyStartY;
joy.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];joyId=t.identifier;joyStartX=t.clientX;joyStartY=t.clientY;},{passive:false});
joy.addEventListener('touchmove',e=>{e.preventDefault();for(let t of e.changedTouches){if(t.identifier===joyId){let dx=t.clientX-joyStartX,dy=t.clientY-joyStartY;let dist=Math.min(30,Math.sqrt(dx*dx+dy*dy));let ang=Math.atan2(dy,dx);joyVec.x=Math.cos(ang)*dist/30;joyVec.y=Math.sin(ang)*dist/30;stick.style.transform='translate(calc(-50% + '+joyVec.x*30+'px), calc(-50% + '+joyVec.y*30+'px))';}}},{passive:false});
joy.addEventListener('touchend',e=>{for(let t of e.changedTouches){if(t.identifier===joyId){joyVec={x:0,y:0};stick.style.transform='translate(-50%,-50%)';joyId=null;}}});

const look=document.getElementById('look-zone');
let lookId=null,lastX,lastY;
look.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];lookId=t.identifier;lastX=t.clientX;lastY=t.clientY;},{passive:false});
look.addEventListener('touchmove',e=>{e.preventDefault();for(let t of e.changedTouches){if(t.identifier===lookId){let dx=t.clientX-lastX,dy=t.clientY-lastY;player.rot-=dx*0.007;player.pitch-=dy*0.005;player.pitch=Math.max(-0.4,Math.min(0.4,player.pitch));lastX=t.clientX;lastY=t.clientY;}}},{passive:false});
look.addEventListener('touchend',e=>{for(let t of e.changedTouches){if(t.identifier===lookId)lookId=null;}});

document.getElementById('fire-btn').addEventListener('touchstart',e=>{e.preventDefault();mouseDown=true},{passive:false});
document.getElementById('fire-btn').addEventListener('touchend',e=>{mouseDown=false});
document.getElementById('btn-reload').addEventListener('touchstart',e=>{e.preventDefault();reload()},{passive:false});
document.getElementById('btn-jump').addEventListener('touchstart',e=>{e.preventDefault();if(player.ground){player.vy=0.2;player.ground=false}},{passive:false});
document.getElementById('wep1').addEventListener('touchstart',e=>{e.preventDefault();switchWeapon(0)},{passive:false});
document.getElementById('wep2').addEventListener('touchstart',e=>{e.preventDefault();switchWeapon(1)},{passive:false});
document.getElementById('wep3').addEventListener('touchstart',e=>{e.preventDefault();switchWeapon(2)},{passive:false});

function switchWeapon(i){
  if(game.reloading)return;
  game.weapon=i;
  document.querySelectorAll('.wep-btn').forEach((el,idx)=>el.classList.toggle('active',idx===i));
  document.getElementById('weapon').textContent=weapons[i].name;
}

function reload(){
  if(game.reloading||game.ammo[game.weapon]>=weapons[game.weapon].ammo)return;
  game.reloading=true;
  setTimeout(()=>{
    let w=weapons[game.weapon];
    let need=w.ammo-game.ammo[game.weapon];
    game.ammo[game.weapon]+=Math.min(need,w.max);
    game.reloading=false;
  },1000);
}

function fire(){
  let w=weapons[game.weapon];
  if(game.reloading||game.ammo[game.weapon]<=0)return;
  let now=performance.now();
  if(game.lastShot&&now-game.lastShot<w.rate)return;
  game.ammo[game.weapon]--;
  game.lastShot=now;
  Audio.shoot();
  
  let pellets=w.pellets||1;
  for(let i=0;i<pellets;i++){
    let angle=player.rot+(Math.random()-0.5)*w.spread;
    bullets.push({
      x:player.x,y:0.3,z:player.z,
      vx:Math.sin(angle)*0.3,
      vz:-Math.cos(angle)*0.3,
      life:35
    });
  }
  player.pitch+=0.025;
}

function spawnEnemy(){
  let angle=Math.random()*Math.PI*2;
  let dist=10+Math.random()*6;
  enemies.push({
    x:player.x+Math.sin(angle)*dist,
    z:player.z+Math.cos(angle)*dist,
    hp:20+game.wave*6,
    speed:0.035+game.wave*0.003
  });
}

// Project 3D to 2D
function project(x,y,z){
  let cz=z-player.z;
  if(cz<0.1)cz=0.1;
  let fov=300;
  let scale=fov/cz;
  let cos=Math.cos(-player.rot);
  let sin=Math.sin(-player.rot);
  let rx=(x-player.x)*cos-cz*sin;
  let rz=(x-player.x)*sin+cz*cos;
  return {x:W/2+rx*scale,y:H/2+(y-player.pitch*cz*0.25)*scale,s:scale};
}

function render(){
  // Sky
  ctx.fillStyle='#0d0d15';
  ctx.fillRect(0,0,W,H);
  
  // Ground - large rectangle
  ctx.fillStyle='#151518';
  ctx.fillRect(0,H*0.4,W,H*0.6);
  
  // Ground grid lines
  ctx.strokeStyle='#222225';
  ctx.lineWidth=1;
  for(let i=0;i<20;i++){
    let y=H*0.4+i*15;
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }
  
  // Sort by distance
  let all=[];
  buildings.forEach(b=>all.push({t:'b',o:b,z:(b.x-player.x)**2+(b.z-player.z)**2}));
  enemies.forEach(e=>all.push({t:'e',o:e,z:(e.x-player.x)**2+(e.z-player.z)**2}));
  bullets.forEach(b=>all.push({t:'bu',o:b,z:(b.x-player.x)**2+(b.z-player.z)**2}));
  all.sort((a,b)=>b.z-a.z);
  
  // Draw
  all.forEach(item=>{
    if(item.t==='b'){
      let b=item.o;
      let p=project(b.x,0,b.z);
      if(p.s<1)return;
      let w=b.w*p.s*0.8;
      let h=b.h*p.s*0.8;
      let d=b.d*p.s*0.8;
      
      // Front face
      ctx.fillStyle='#2a2a32';
      ctx.fillRect(p.x-w/2,p.y-h,w,h);
      // Roof
      ctx.fillStyle='#35353d';
      ctx.beginPath();
      ctx.moveTo(p.x-w/2,p.y-h);
      ctx.lineTo(p.x+w/2,p.y-h);
      ctx.lineTo(p.x+w/2-d*0.3,p.y-h-d*0.2);
      ctx.lineTo(p.x-w/2-d*0.3,p.y-h-d*0.2);
      ctx.fill();
      // Windows
      ctx.fillStyle=Math.random()>0.4?'#4a3520':'#152040';
      for(let wy=1;wy<b.h-1;wy+=2){
        let wp=project(b.x,wy,b.z);
        if(wp.s>20)ctx.fillRect(wp.x-wp.s*0.15,wp.y,wp.s*0.3,wp.s*0.25);
      }
    }
    else if(item.t==='e'){
      let e=item.o;
      let p=project(e.x,0.7,e.z);
      if(p.s<1)return;
      let size=Math.min(35,60/p.s);
      
      // Body
      ctx.fillStyle='#4a5544';
      ctx.beginPath();
      ctx.arc(p.x,p.y,size,0,Math.PI*2);
      ctx.fill();
      // Eyes
      ctx.fillStyle='#f00';
      ctx.beginPath();
      ctx.arc(p.x-size*0.35,p.y-size*0.25,size*0.18,0,Math.PI*2);
      ctx.arc(p.x+size*0.35,p.y-size*0.25,size*0.18,0,Math.PI*2);
      ctx.fill();
    }
    else if(item.t==='bu'){
      let b=item.o;
      let p=project(b.x,b.y,b.z);
      if(p.s<1)return;
      ctx.fillStyle='#ff0';
      ctx.fillRect(p.x-2,p.y-2,4,4);
    }
  });
  
  // Particles
  particles.forEach(p=>{
    let pr=project(p.x,p.y,p.z);
    if(pr.s<1)return;
    ctx.globalAlpha=p.life/15;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(pr.x,pr.y,Math.min(8,40/pr.s),0,Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha=1;
}

function update(){
  if(!game.running)return;
  
  // Move
  let spd=joyVec.y>0.1?0.1:0.05;
  player.x+=Math.sin(player.rot)*joyVec.y*spd;
  player.z+=-Math.cos(player.rot)*joyVec.y*spd;
  player.x+=Math.cos(player.rot)*joyVec.x*spd*0.6;
  player.z+=Math.sin(player.rot)*joyVec.x*spd*0.6;
  player.x=Math.max(-BOUNDS,Math.min(BOUNDS,player.x));
  player.z=Math.max(-BOUNDS,Math.min(BOUNDS,player.z));
  
  // Jump
  player.vy-=0.005;
  player.y+=player.vy;
  if(player.y<=0){player.y=0;player.vy=0;player.ground=true;}
  player.pitch*=0.93;
  
  // Fire
  if(mouseDown)fire();
  
  // Bullets
  bullets.forEach((b,i)=>{
    b.x+=b.vx;
    b.z+=b.vz;
    b.life--;
    enemies.forEach((e,ei)=>{
      let d=(b.x-e.x)**2+(b.z-e.z)**2;
      if(d<0.6){
        e.hp-=weapons[game.weapon].damage;
        b.life=0;
        Audio.hit();
        for(let k=0;k<3;k++){
          particles.push({x:e.x,y:0.7,e.z:e.z,vx:(Math.random()-0.5)*0.12,vy:Math.random()*0.12,vz:(Math.random()-0.5)*0.12,life:12,color:'#800'});
        }
        if(e.hp<=0){enemies.splice(ei,1);game.kills=(game.kills||0)+1;}
      }
    });
  });
  bullets=bullets.filter(b=>b.life>0);
  
  // Enemies
  enemies.forEach(e=>{
    let dx=player.x-e.x,dz=player.z-e.z;
    let d=Math.sqrt(dx*dx+dz*dz);
    if(d>0.7){e.x+=dx/d*e.speed;e.z+=dz/d*e.speed;}
  });
  
  // Spawn
  if(enemies.length<3+game.wave*2&&Math.random()<0.025)spawnEnemy();
  if(enemies.length===0&&game.wave<20){game.wave++;game.health=Math.min(100,game.health+12);}
  
  // Particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.z+=p.vz;p.vy-=0.006;p.life--;});
  particles=particles.filter(p=>p.life>0);
  
  // UI
  document.getElementById('hp-fill').style.width=game.health+'%';
  document.getElementById('ammo').textContent=game.ammo[game.weapon];
  document.getElementById('wave').textContent='WAVE '+game.wave;
  document.getElementById('enemy-count').textContent=enemies.length;
  
  if(game.health<=0){
    game.running=false;
    document.getElementById('start').style.display='flex';
    document.querySelector('#start h1').textContent='GAME OVER';
    document.querySelector('#start h1').style.color='#666';
    document.querySelector('#start p').textContent='KILLS: '+(game.kills||0)+' | WAVE: '+game.wave;
    document.querySelector('#start button').textContent='TRY AGAIN';
  }
}

function loop(){
  update();
  render();
  requestAnimationFrame(loop);
}

function startGame(){
  Audio.init();
  game={running:true,health:100,wave:1,kills:0,weapon:0,ammo:[15,90],reloading:false};
  player={x:0,y:0,z:0,rot:0,pitch:0,vy:0,ground:true};
  bullets=[];enemies=[];particles=[];
  document.getElementById('start').style.display='none';
  document.getElementById('hud').style.display='block';
  for(let i=0;i<3;i++)spawnEnemy();
}

loop();
document.querySelector('#start button').addEventListener('click',function(){
  Audio.init();
  game={running:true,health:100,wave:1,kills:0,weapon:0,ammo:[15,90],reloading:false};
  player={x:0,y:0,z:0,rot:0,pitch:0,vy:0,ground:true};
  bullets=[];enemies=[];particles=[];
  document.getElementById('start').style.display='none';
  document.getElementById('hud').style.display='block';
  for(let i=0;i<3;i++)spawnEnemy();
});
</script>
</body>
</html>
