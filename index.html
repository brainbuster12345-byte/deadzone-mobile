<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>DEADZONE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:system-ui}
#game{width:100%;height:100%;display:block;background:#111}
#start{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,#1a0a0a,#0d0d0d);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center}
#start h1{font-size:48px;color:#e74c3c;text-shadow:0 0 15px #c0392b;margin-bottom:10px}
#start p{color:#555;margin-bottom:30px}
#start button{padding:14px 40px;font-size:16px;background:#c0392b;border:none;color:#fff;border-radius:4px}
#hud{position:fixed;top:10px;left:10px;z-index:50;display:none}
.health{width:100px;height:8px;background:#333;border-radius:4px}
.health-fill{height:100%;background:#e74c3c;width:100%}
.weapon{position:fixed;bottom:20px;right:20px;font-size:20px;z-index:50}
.ammo{position:fixed;bottom:20px;right:80px;font-size:14px;color:#888;z-index:50}
.wave{position:fixed;top:10px;right:10px;font-size:14px;color:#888;z-index:50}
#enemy-count{position:fixed;top:35px;right:10px;font-size:12px;color:#e74c3c;z-index:50}
.damage{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:45;background:rgba(139,0,0,0);transition:background 0.1s}
.vignette{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:44;background:radial-gradient(transparent 40%,rgba(80,0,0,0));transition:background 0.3s}
#joystick{position:fixed;bottom:20px;left:20px;width:110px;height:110px;z-index:60}
#joystick-base{width:100%;height:100%;border-radius:50%;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.2)}
#joystick-stick{width:45px;height:45px;border-radius:50%;background:rgba(255,255,255,0.25);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
#fire-btn{position:fixed;bottom:30px;right:30px;width:80px;height:80px;border-radius:50%;background:rgba(192,57,43,0.5);border:3px solid #c0392b;color:#fff;font-size:14px;font-weight:bold;z-index:60;display:flex;align-items:center;justify-content:center}
#look-zone{position:fixed;top:0;right:0;width:50%;height:100%;z-index:55}
#weapon-btns{position:fixed;top:40%;right:10px;z-index:60}
.wep-btn{width:45px;height:35px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:#888;font-size:12px;margin-bottom:8px}
.wep-btn.active{background:rgba(192,57,43,0.5);border-color:#c0392b;color:#e74c3c}
#action-btns{position:fixed;bottom:130px;right:30px;z-index:60}
.action-btn{width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);color:#fff;font-size:12px;margin-bottom:8px}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="start">
<h1>DEADZONE</h1>
<p>TAP TO SURVIVE</p>
<button onclick="startGame()">PLAY</button>
</div>
<div id="hud"><div class="health"><div class="health-fill" id="hp-fill"></div></div></div>
<div class="weapon" id="weapon">PISTOL</div>
<div class="ammo" id="ammo">15</div>
<div class="wave" id="wave">WAVE 1</div>
<div id="enemy-count">0</div>
<div class="damage" id="damage-flash"></div>
<div class="vignette" id="vignette"></div>
<div id="joystick"><div id="joystick-base"><div id="joystick-stick"></div></div></div>
<div id="fire-btn">FIRE</div>
<div id="look-zone"></div>
<div id="weapon-btns">
<div class="wep-btn active" id="wep1">1</div>
<div class="wep-btn" id="wep2">2</div>
<div class="wep-btn" id="wep3">3</div>
</div>
<div id="action-btns">
<div class="action-btn" id="btn-reload">R</div>
<div class="action-btn" id="btn-jump">JUMP</div>
</div>
<script>
// Canvas & Context
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
}
resize();
window.addEventListener('resize',resize);

// Audio
const Audio={
  ctx:null,
  init(){
    this.ctx=new(window.AudioContext||window.webkitAudioContext)();
  },
  shoot(){
    if(!this.ctx)return;
    const osc=this.ctx.createOscillator();
    const gain=this.ctx.createGain();
    osc.type='square';
    osc.frequency.setValueAtTime(150,this.ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(50,this.ctx.currentTime+0.1);
    gain.gain.setValueAtTime(0.15,this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01,this.ctx.currentTime+0.1);
    osc.connect(gain);gain.connect(this.ctx.destination);
    osc.start();osc.stop(this.ctx.currentTime+0.1);
  },
  hit(){
    if(!this.ctx)return;
    const osc=this.ctx.createOscillator();
    const gain=this.ctx.createGain();
    osc.type='sawtooth';
    osc.frequency.value=80;
    gain.gain.setValueAtTime(0.1,this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01,this.ctx.currentTime+0.15);
    osc.connect(gain);gain.connect(this.ctx.destination);
    osc.start();osc.stop(this.ctx.currentTime+0.15);
  },
  empty(){
    if(!this.ctx)return;
    const osc=this.ctx.createOscillator();
    const gain=this.ctx.createGain();
    osc.type='sine';
    osc.frequency.value=2000;
    gain.gain.setValueAtTime(0.08,this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01,this.ctx.currentTime+0.03);
    osc.connect(gain);gain.connect(this.ctx.destination);
    osc.start();osc.stop(this.ctx.currentTime+0.03);
  }
};

// Game State
let game={running:false,health:100,wave:1,kills:0,weapon:0,ammo:[15,90],reloading:false};
const weapons=[
  {name:'PISTOL',damage:25,rate:250,ammo:15,max:90,spread:0.03},
  {name:'SHOTGUN',damage:10,rate:800,ammo:8,max:48,spread:0.12, pellets:5},
  {name:'RIFLE',damage:18,rate:120,ammo:30,max:120,spread:0.025}
];

// Player
let player={x:0,y:0,z:0,rot:0,vy:0,ground:true};
let bullets=[];
let enemies=[];
let particles=[];

// Map - Buildings
const buildings=[];
for(let i=0;i<12;i++){
  buildings.push({
    x:(Math.random()-0.5)*60,
    z:(Math.random()-0.5)*60,
    w:4+Math.random()*6,
    h:5+Math.random()*10,
    d:4+Math.random()*6
  });
}
// Ground bounds
const bounds=45;

// Input
let mouseDown=false;
let joyVec={x:0,y:0};

// Touch Controls
const joy=document.getElementById('joystick');
const stick=document.getElementById('joystick-stick');
let joyId=null,joyStartX,joyStartY;

joy.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  joyId=t.identifier;
  joyStartX=t.clientX;joyStartY=t.clientY;
},{passive:false});

joy.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(let t of e.changedTouches){
    if(t.identifier===joyId){
      let dx=t.clientX-joyStartX;
      let dy=t.clientY-joyStartY;
      let dist=Math.min(35,Math.sqrt(dx*dx+dy*dy));
      let ang=Math.atan2(dy,dx);
      joyVec.x=Math.cos(ang)*dist/35;
      joyVec.y=Math.sin(ang)*dist/35;
      stick.style.transform=`translate(calc(-50% + ${joyVec.x*35}px), calc(-50% + ${joyVec.y*35}px))`;
    }
  }
},{passive:false});

joy.addEventListener('touchend',e=>{
  for(let t of e.changedTouches){
    if(t.identifier===joyId){joyVec={x:0,y:0};stick.style.transform='translate(-50%,-50%)';joyId=null;}
  }
});

const look=document.getElementById('look-zone');
let lookId=null,lastX,lastY;
look.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  lookId=t.identifier;lastX=t.clientX;lastY=t.clientY;
},{passive:false});

look.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(let t of e.changedTouches){
    if(t.identifier===lookId){
      let dx=t.clientX-lastX;
      let dy=t.clientY-lastY;
      player.rot-=dx*0.006;
      player.pitch-=dy*0.004;
      player.pitch=Math.max(-0.5,Math.min(0.5,player.pitch));
      lastX=t.clientX;lastY=t.clientY;
    }
  }
},{passive:false});

look.addEventListener('touchend',e=>{for(let t of e.changedTouches){if(t.identifier===lookId)lookId=null;}});

document.getElementById('fire-btn').addEventListener('touchstart',e=>{e.preventDefault();mouseDown=true},{passive:false});
document.getElementById('fire-btn').addEventListener('touchend',e=>{mouseDown=false});
document.getElementById('btn-reload').addEventListener('touchstart',e=>{e.preventDefault();reload()},{passive:false});
document.getElementById('btn-jump').addEventListener('touchstart',e=>{e.preventDefault();if(player.ground){player.vy=0.25;player.ground=false}},{passive:false});
document.getElementById('wep1').addEventListener('touchstart',e=>{e.preventDefault();switchWeapon(0)},{passive:false});
document.getElementById('wep2').addEventListener('touchstart',e=>{e.preventDefault();switchWeapon(1)},{passive:false});
document.getElementById('wep3').addEventListener('touchstart',e=>{e.preventDefault();switchWeapon(2)},{passive:false});

function switchWeapon(i){
  if(game.reloading)return;
  game.weapon=i;
  document.querySelectorAll('.wep-btn').forEach((el,idx)=>el.classList.toggle('active',idx===i));
  document.getElementById('weapon').textContent=weapons[i].name;
}

function reload(){
  if(game.reloading||game.ammo[game.weapon]>=weapons[game.weapon].ammo)return;
  game.reloading=true;
  setTimeout(()=>{
    let w=weapons[game.weapon];
    let need=w.ammo-game.ammo[game.weapon];
    let take=Math.min(need,w.max);
    game.ammo[game.weapon]+=take;
    game.reloading=false;
  },1200);
}

function fire(){
  let w=weapons[game.weapon];
  if(game.reloading||game.ammo[game.weapon]<=0)return;
  let now=performance.now();
  if(game.lastShot&&now-game.lastShot<w.rate)return;
  game.ammo[game.weapon]--;
  game.lastShot=now;
  Audio.shoot();
  
  let pellets=w.pellets||1;
  for(let i=0;i<pellets;i++){
    let spread=w.spread;
    let angle=player.rot+(Math.random()-0.5)*spread;
    bullets.push({
      x:player.x,y:0.3,z:player.z,
      vx:Math.sin(angle)*0.35,
      vy:0,
      vz:-Math.cos(angle)*0.35,
      life:40
    });
  }
  player.pitch+=0.03;
}

function spawnEnemy(){
  let angle=Math.random()*Math.PI*2;
  let dist=12+Math.random()*8;
  enemies.push({
    x:player.x+Math.sin(angle)*dist,
    z:player.z+Math.cos(angle)*dist,
    hp:25+game.wave*8,
    speed:0.04+game.wave*0.004
  });
}

// 3D Projection
function project(x,y,z){
  let cz=z-player.z;
  let cx=x-player.x;
  let fov=350;
  if(cz<0.1)cz=0.1;
  let scale=fov/cz;
  // Rotate around player
  let cos=Math.cos(-player.rot);
  let sin=Math.sin(-player.rot);
  let rx=cx*cos-cz*sin;
  let rz=cx*sin+cz*cos;
  return {
    x:W/2+rx*scale,
    y:H/2+(y-player.pitch*cz*0.3)*scale,
    s:scale,
    z:rz
  };
}

function render(){
  // Sky/Background
  ctx.fillStyle='#0a0a12';
  ctx.fillRect(0,0,W,H);
  
  // Ground
  let gp1=project(-bounds,0,-bounds);
  let gp2=project(bounds,0,bounds);
  ctx.fillStyle='#1a1a1a';
  ctx.fillRect(gp1.x,gp1.y,gp2.x-gp1.x,gp2.y-gp1.y);
  
  // Grid lines on ground
  ctx.strokeStyle='#222';
  ctx.lineWidth=1;
  for(let gz=-bounds;gz<=bounds;gz+=10){
    let p1=project(-bounds,0,gz);
    let p2=project(bounds,0,gz);
    ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();
  }
  for(let gx=-bounds;gx<=bounds;gx+=10){
    let p1=project(gx,0,-bounds);
    let p2=project(gx,0,bounds);
    ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();
  }
  
  // Sort objects by distance
  let all=[];
  buildings.forEach(b=>all.push({type:'building',obj:b,z:(b.x-player.x)**2+(b.z-player.z)**2}));
  enemies.forEach(e=>all.push({type:'enemy',obj:e,z:(e.x-player.x)**2+(e.z-player.z)**2}));
  bullets.forEach(b=>all.push({type:'bullet',obj:b,z:(b.x-player.x)**2+(b.z-player.z)**2}));
  all.sort((a,b)=>b.z-a.z);
  
  // Draw all
  all.forEach(item=>{
    if(item.type==='building'){
      let b=item.obj;
      // Only draw if in front
      let p1=project(b.x-b.w/2,0,b.z-b.d/2);
      let p2=project(b.x+b.w/2,0,b.z+b.d/2);
      if(p1.s<0.1)return;
      
      // Building body
      let pb1=project(b.x-b.w/2,b.h,b.z-b.d/2);
      let pb2=project(b.x+b.w/2,b.h,b.z-b.d/2);
      let pb3=project(b.x+b.w/2,b.h,b.z+b.d/2);
      let pb4=project(b.x-b.w/2,b.h,b.z+b.d/2);
      
      ctx.fillStyle='#2a2a30';
      ctx.beginPath();
      ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.lineTo(pb2.x,pb2.y);ctx.lineTo(pb1.x,pb1.y);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(p2.x,p2.y);ctx.lineTo(p3.x,p3.y);ctx.lineTo(pb3.x,pb3.y);ctx.lineTo(pb2.x,pb2.y);
      ctx.fill();
      
      // Roof
      ctx.fillStyle='#333338';
      ctx.beginPath();
      ctx.moveTo(pb1.x,pb1.y);ctx.lineTo(pb2.x,pb2.y);ctx.lineTo(pb3.x,pb3.y);ctx.lineTo(pb4.x,pb4.y);
      ctx.fill();
      
      // Windows
      ctx.fillStyle=Math.random()>0.5?'#553300':'#112244';
      for(let wy=2;wy<b.h-1;wy+=2.5){
        let pw=project(b.x-b.w/2+0.5,wy,b.z);
        if(pw.s>30)ctx.fillRect(pw.x,pw.y,4*pw.s/80,4*pw.s/80);
      }
    }
    else if(item.type==='enemy'){
      let e=item.obj;
      let p=project(e.x,0.8,e.z);
      if(p.s<0.1)return;
      let size=Math.min(40,80/p.s);
      
      // Body
      ctx.fillStyle='#4a5544';
      ctx.beginPath();
      ctx.arc(p.x,p.y,size,0,Math.PI*2);
      ctx.fill();
      
      // Eyes
      ctx.fillStyle='#f00';
      ctx.beginPath();
      ctx.arc(p.x-size*0.3,p.y-size*0.2,size*0.15,0,Math.PI*2);
      ctx.arc(p.x+size*0.3,p.y-size*0.2,size*0.15,0,Math.PI*2);
      ctx.fill();
    }
    else if(item.type==='bullet'){
      let b=item.obj;
      let p=project(b.x,b.y,b.z);
      if(p.s<0.1)return;
      ctx.fillStyle='#ff0';
      ctx.fillRect(p.x-2,p.y-2,4,4);
    }
  });
  
  // Particles
  particles.forEach(p=>{
    let pr=project(p.x,p.y,p.z);
    if(pr.s<0.1)return;
    ctx.globalAlpha=p.life/20;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(pr.x,pr.y,Math.min(10,30/pr.s),0,Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha=1;
}

function update(){
  if(!game.running)return;
  
  // Movement
  let speed=joyVec.y>0.1?0.12:0.06;
  player.x+=Math.sin(player.rot)*joyVec.y*speed;
  player.z+=-Math.cos(player.rot)*joyVec.y*speed;
  player.x+=Math.cos(player.rot)*joyVec.x*speed*0.7;
  player.z+=Math.sin(player.rot)*joyVec.x*speed*0.7;
  
  // Bounds
  player.x=Math.max(-bounds,Math.min(bounds,player.x));
  player.z=Math.max(-bounds,Math.min(bounds,player.z));
  
  // Jump/Gravity
  player.vy-=0.006;
  player.y+=player.vy;
  if(player.y<=0){player.y=0;player.vy=0;player.ground=true;}
  player.pitch*=0.92;
  
  // Fire
  if(mouseDown)fire();
  
  // Bullets
  bullets.forEach((b,i)=>{
    b.x+=b.vx;
    b.z+=b.vz;
    b.life--;
    
    // Hit enemies
    enemies.forEach((e,ei)=>{
      let dx=b.x-e.x,dy=b.y-0.8,dz=b.z-e.z;
      if(dx*dx+dy*dy+dz*dz<0.8){
        e.hp-=weapons[game.weapon].damage;
        b.life=0;
        Audio.hit();
        // Blood
        for(let k=0;k<4;k++){
          particles.push({x:e.x,y:0.8,e.z:e.z,vx:(Math.random()-0.5)*0.15,vy:Math.random()*0.15,vz:(Math.random()-0.5)*0.15,life:15,color:'#800'});
        }
        if(e.hp<=0){
          enemies.splice(ei,1);
          game.kills++;
        }
      }
    });
  });
  bullets=bullets.filter(b=>b.life>0);
  
  // Enemies
  enemies.forEach(e=>{
    let dx=player.x-e.x,dz=player.z-e.z;
    let dist=Math.sqrt(dx*dx+dz*dz);
    if(dist>0.8){
      e.x+=dx/dist*e.speed;
      e.z+=dz/dist*e.speed;
    }else{
      game.health-=0.3;
      document.getElementById('damage-flash').style.background='rgba(139,0,0,0.4)';
      setTimeout(()=>document.getElementById('damage-flash').style.background='rgba(139,0,0,0)',80);
    }
  });
  
  // Spawn
  if(enemies.length<4+game.wave*2&&Math.random()<0.02)spawnEnemy();
  
  // Wave
  if(enemies.length===0&&game.wave<20){
    game.wave++;
    game.health=Math.min(100,game.health+15);
  }
  
  // Particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.z+=p.vz;p.vy-=0.008;p.life--;});
  particles=particles.filter(p=>p.life>0);
  
  // UI
  document.getElementById('hp-fill').style.width=game.health+'%';
  document.getElementById('ammo').textContent=game.ammo[game.weapon];
  document.getElementById('wave').textContent='WAVE '+game.wave;
  document.getElementById('enemy-count').textContent=enemies.length;
  document.getElementById('vignette').style.background=game.health<30?'radial-gradient(transparent 40%,rgba(80,0,0,0.6))':'radial-gradient(transparent 40%,rgba(80,0,0,0))';
  
  // Game Over
  if(game.health<=0){
    game.running=false;
    document.getElementById('start').style.display='flex';
    document.querySelector('#start h1').textContent='GAME OVER';
    document.querySelector('#start h1').style.color='#888';
    document.querySelector('#start p').textContent='KILLS: '+game.kills+' | WAVE: '+game.wave;
    document.querySelector('#start button').textContent='TRY AGAIN';
  }
}

function loop(){
  update();
  render();
  requestAnimationFrame(loop);
}

function startGame(){
  Audio.init();
  game={running:true,health:100,wave:1,kills:0,weapon:0,ammo:[15,90],reloading:false};
  player={x:0,y:0,z:0,rot:0,pitch:0,vy:0,ground:true};
  bullets=[];enemies=[];particles=[];
  document.getElementById('start').style.display='none';
  document.getElementById('hud').style.display='block';
  for(let i=0;i<4;i++)spawnEnemy();
}

loop();
</script>
</body>
</html>
